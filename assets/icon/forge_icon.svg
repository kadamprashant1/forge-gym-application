<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#0a0a0a"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#iconClip)" opacity="0.06">
    <line x1="0" y1="200" x2="1024" y2="200" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="0" y1="800" x2="1024" y2="800" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="200" y1="0" x2="200" y2="1024" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="400" y1="0" x2="400" y2="1024" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="600" y1="0" x2="600" y2="1024" stroke="#c8ff00" stroke-width="1.5"/>
    <line x1="800" y1="0" x2="800" y2="1024" stroke="#c8ff00" stroke-width="1.5"/>
  </g>

  <!-- Glow behind barbell -->
  <ellipse cx="512" cy="440" rx="320" ry="140" fill="#c8ff00" opacity="0.07"/>

  <!-- ===== BARBELL ===== -->

  <!-- Left outer plate -->
  <rect x="108" y="374" width="72" height="130" rx="12" fill="#c8ff00"/>
  <!-- Left inner plate -->
  <rect x="180" y="390" width="52" height="98" rx="8" fill="#9dc200"/>
  <!-- Left collar -->
  <rect x="232" y="406" width="48" height="66" rx="8" fill="#c8ff00"/>

  <!-- Right outer plate -->
  <rect x="844" y="374" width="72" height="130" rx="12" fill="#c8ff00"/>
  <!-- Right inner plate -->
  <rect x="792" y="390" width="52" height="98" rx="8" fill="#9dc200"/>
  <!-- Right collar -->
  <rect x="744" y="406" width="48" height="66" rx="8" fill="#c8ff00"/>

  <!-- Bar rod -->
  <rect x="280" y="426" width="464" height="32" rx="16" fill="#2a2a2a"/>
  <rect x="280" y="430" width="464" height="12" rx="6" fill="#3a3a3a"/>

  <!-- ===== "F" lettermark ===== -->
  <!-- Vertical stroke -->
  <rect x="456" y="538" width="36" height="144" rx="8" fill="#c8ff00"/>
  <!-- Top horizontal bar -->
  <rect x="456" y="538" width="124" height="36" rx="8" fill="#c8ff00"/>
  <!-- Mid horizontal bar -->
  <rect x="456" y="610" width="90" height="28" rx="7" fill="#c8ff00"/>

  <!-- Decorative dots row -->
  <circle cx="380" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>
  <circle cx="414" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>
  <circle cx="448" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>
  <circle cx="512" cy="750" r="11" fill="#c8ff00"/>
  <circle cx="576" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>
  <circle cx="610" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>
  <circle cx="644" cy="750" r="8" fill="#c8ff00" opacity="0.4"/>

  <!-- Corner accent top-left -->
  <line x1="0" y1="300" x2="80" y2="300" stroke="#c8ff00" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="300" y1="0" x2="300" y2="80" stroke="#c8ff00" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- Corner accent bottom-right -->
  <line x1="944" y1="1024" x2="1024" y2="1024" stroke="#c8ff00" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="724" y1="944" x2="724" y2="1024" stroke="#c8ff00" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- Icon border -->
  <rect width="1024" height="1024" rx="220" fill="none" stroke="#c8ff00" stroke-width="5" opacity="0.2"/>
</svg>
